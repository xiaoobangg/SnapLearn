mybatis-plus:
  global-config:
    db-config:
      id-type: assign_uuid
  configuration:
    map-underscore-to-camel-case: true
  mapper-locations: classpath*:/mapper/**/*.xml

app:
  jwt:
    secret: ${JWT_SECRET}
    expire-minutes: ${JWT_EXPIRE_MINUTES:10080}
  wechat:
    app-id: ${WECHAT_APP_ID}
    app-secret: ${WECHAT_APP_SECRET}
  baidu-ocr:
    api-key: ${BAIDU_OCR_API_KEY}
    secret-key: ${BAIDU_OCR_SECRET_KEY}
  upload:
    dir: ${UPLOAD_DIR:/app/uploads}
  base-url: ${APP_BASE_URL:}
  admin:
    jwt:
      secret: ${ADMIN_JWT_SECRET}
      expire-minutes: ${ADMIN_JWT_EXPIRE_MINUTES:1440}
  debug: ${DEBUG:true}
  coze:
    api:
      token: ${COZE_API_TOKEN}

logging:
  file:
    path: ${LOGGING_FILE_PATH:/app/logs}  # 从环境变量读取，默认 /app/logs
    name: ${LOGGING_FILE_PATH:/app/logs}/snaplearn.log  # 日志文件名
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  level:
    root: INFO
    com.snaplearn: DEBUG
    # ===== RAG 排查日志：先开下面这组，定位到问题后可关掉减少噪音 =====
    # ① 自定义 loggingRetriever：打印召回的 query / 文档数 / 相似度 / 内容预览（核心）
    com.snaplearn.service.LLMService: DEBUG
    # ② RAG 流水线本身（QueryTransformer / Retriever / Augmenter 内部日志）
    org.springframework.ai.rag: DEBUG
    # ③ pgvector 向量库底层 SQL 与查询参数
    org.springframework.ai.vectorstore: DEBUG
    org.springframework.ai.vectorstore.pgvector: DEBUG
    # ④ 最终发给模型的完整 Prompt（含 RAG 注入的 context）
    org.springframework.ai.chat.client: TRACE
    # ===== 其他备用调试日志，需要再开 =====
    # chat memory 表 SQL + advisor 日志
    # org.springframework.ai.chat.memory: DEBUG
    # org.springframework.ai.chat.memory.repository.jdbc: DEBUG
    # org.springframework.ai.chat.client.advisor.MessageChatMemoryAdvisor: DEBUG
    # JdbcTemplate SQL 日志（spring_ai_chat_memory 的 CRUD）
    # org.springframework.jdbc.core.JdbcTemplate: DEBUG
    # org.springframework.jdbc.core.StatementCreatorUtils: TRACE

# ===== Prometheus 可观测性 =====
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: snaplearn-backend
    distribution:
      percentiles-histogram:
        gen_ai.client.operation.duration: true
        spring.ai.advisor: true
        http.server.requests: true
      percentiles:
        gen_ai.client.operation.duration: 0.5,0.95,0.99
        http.server.requests: 0.5,0.95,0.99


