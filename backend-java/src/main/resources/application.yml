server:
  port: 8080

spring:
  application:
    name: snaplearn-backend
  profiles:
    active: dev
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_HOST:127.0.0.1}:${DB_PORT:5433}/${DB_NAME:snap_learn}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD}
    hikari:
      minimum-idle: 2
      maximum-pool-size: 10
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
  jackson:
    property-naming-strategy: SNAKE_CASE
  ai:
    vectorstore:
      pgvector:
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 1536
        max-document-batch-size: 10000
    retry:
      max-attempts: 10
    deepseek: # deepseek（用 OpenAI 兼容接口）
      api-key: ${LLM_API_KEY}
      base-url: ${AI_BASE_URL:https://api.deepseek.com}
      chat:
        options:
          model: ${LLM_MODEL:deepseek-v4-flash}
    dashscope: # 阿里云通义千问
      api-key: ${AI_DASHSCOPE_API_KEY}
      base-url: ${AI_DASHSCOPE_BASE_URL:https://dashscope.aliyuncs.com}
      chat:
        options:
          model: qwen-plus
      embedding:
        options:
          dimensions: 1536  # 新增：强制输出1536维
          model: text-embedding-v4

